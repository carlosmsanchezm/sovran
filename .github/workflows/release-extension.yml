name: Release VS Code Extension

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Release VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.1-dev.$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Install dependencies
        working-directory: aegis-vscode-remote/extension
        run: npm ci

      - name: Set version in package.json
        working-directory: aegis-vscode-remote/extension
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Build
        working-directory: aegis-vscode-remote/extension
        run: npm run build

      - name: Run tests
        working-directory: aegis-vscode-remote/extension
        run: npm run test:unit

      - name: Package VSIX
        working-directory: aegis-vscode-remote/extension
        run: npx @vscode/vsce package --out "aegis-remote-${{ steps.version.outputs.version }}.vsix"

      - name: Generate SHA-256 checksum
        working-directory: aegis-vscode-remote/extension
        run: |
          sha256sum "aegis-remote-${{ steps.version.outputs.version }}.vsix" > "aegis-remote-${{ steps.version.outputs.version }}.vsix.sha256"
          echo "SHA-256:"
          cat "aegis-remote-${{ steps.version.outputs.version }}.vsix.sha256"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: aegis-remote-vsix
          path: |
            aegis-vscode-remote/extension/aegis-remote-${{ steps.version.outputs.version }}.vsix
            aegis-vscode-remote/extension/aegis-remote-${{ steps.version.outputs.version }}.vsix.sha256
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Aegis VS Code Extension v${{ steps.version.outputs.version }}"
          body: |
            ## Aegis Remote VS Code Extension v${{ steps.version.outputs.version }}

            ### Installation

            1. Download `aegis-remote-${{ steps.version.outputs.version }}.vsix` below
            2. Install: `code --install-extension aegis-remote-${{ steps.version.outputs.version }}.vsix --force`
            3. Enable proposed API in `~/.vscode/argv.json` (macOS: `~/Library/Application Support/Code/argv.json`):
               ```json
               { "enable-proposed-api": ["aegis.aegis-remote"] }
               ```
            4. Restart VS Code

            ### Automated Setup

            ```bash
            curl -fsSL <platform-url>/api/v1/extension/setup-script | bash
            ```

            ### Checksum
            See `aegis-remote-${{ steps.version.outputs.version }}.vsix.sha256` for SHA-256 verification.
          files: |
            aegis-vscode-remote/extension/aegis-remote-${{ steps.version.outputs.version }}.vsix
            aegis-vscode-remote/extension/aegis-remote-${{ steps.version.outputs.version }}.vsix.sha256
          fail_on_unmatched_files: true
