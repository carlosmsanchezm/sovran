name: Extension Cloud TLS E2E

on:
  push:
    branches:
      - feature/ci-tests
  workflow_dispatch:

jobs:
  emit-endpoints:
    name: Emit Preview Endpoints
    runs-on: ubuntu-latest
    outputs:
      preview_id: ${{ steps.emit.outputs.preview_id }}
      preview_namespace: ${{ steps.emit.outputs.preview_namespace }}
      preview_release: ${{ steps.emit.outputs.preview_release }}
      grpc_addr: ${{ steps.emit.outputs.grpc_addr }}
      grpc_host: ${{ steps.emit.outputs.grpc_host }}
      proxy_hostname: ${{ steps.emit.outputs.proxy_hostname }}
      grpc_ca: ${{ steps.emit.outputs.grpc_ca }}
    steps:
      - uses: actions/checkout@v4

      - name: Emit placeholders
        id: emit
        run: |
          echo "preview_id=local" >> "$GITHUB_OUTPUT"
          echo "preview_namespace=local" >> "$GITHUB_OUTPUT"
          echo "preview_release=local" >> "$GITHUB_OUTPUT"
          echo "grpc_addr=platform-api-grpc.localtest.me:443" >> "$GITHUB_OUTPUT"
          echo "grpc_host=platform-api-grpc.localtest.me" >> "$GITHUB_OUTPUT"
          echo "proxy_hostname=proxy.localtest.me" >> "$GITHUB_OUTPUT"
          echo "grpc_ca=" >> "$GITHUB_OUTPUT"

  extension-e2e:
    name: Extension TLS E2E (Mock)
    runs-on: ubuntu-latest
    needs: emit-endpoints
    env:
      AEGIS_GRPC_ADDR: ${{ needs.emit-endpoints.outputs.grpc_addr }}
      AEGIS_PLATFORM_NAMESPACE: ${{ needs.emit-endpoints.outputs.preview_namespace }}
      AEGIS_PROJECT_ID: local-project
      AEGIS_TEST_EMAIL: ${{ secrets.AEGIS_TEST_EMAIL }}
      AEGIS_TEST_TOKEN: ${{ secrets.AEGIS_TEST_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Run mock E2E suite
        run: npm run test:e2e
*** End Patch
