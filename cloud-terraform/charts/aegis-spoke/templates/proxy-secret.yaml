{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegis-spoke.proxy.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis-spoke.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
type: Opaque
data:
  jwt-secret: {{ .Values.proxy.jwtSecret | b64enc }}
{{- if not .Values.proxy.tls.terminateAtIngress }}
  {{- $cert := required "proxy.tls.cert must be provided when proxy.tls.terminateAtIngress is false" .Values.proxy.tls.cert }}
  {{- $key := required "proxy.tls.key must be provided when proxy.tls.terminateAtIngress is false" .Values.proxy.tls.key }}
  tls.crt: {{ $cert | b64enc }}
  tls.key: {{ $key | b64enc }}
{{- end }}
{{- end }}
