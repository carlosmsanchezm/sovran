apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegis-spoke.k8sAgent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis-spoke.labels" . | nindent 4 }}
    app.kubernetes.io/component: k8s-agent
spec:
  replicas: {{ .Values.k8sAgent.replicaCount }}
  selector:
    matchLabels:
      {{- include "aegis-spoke.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: k8s-agent
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        {{- include "aegis-spoke.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: k8s-agent
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ .Values.rbac.serviceAccount.name }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: "{{ .Values.k8sAgent.image.repository }}:{{ .Values.k8sAgent.image.tag }}"
          imagePullPolicy: {{ .Values.k8sAgent.image.pullPolicy }}
          command: ["/manager"]
          args:
            - --leader-elect
            - --health-probe-bind-address=:8081
          ports: []
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          env:
            {{- range $k, $v := .Values.k8sAgent.env }}
            {{- if ne $k "AEGIS_PROXY_INGRESS_HOST" }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            - name: AEGIS_PROXY_INGRESS_HOST
              value: {{ .Values.proxy.ingress.hostname | quote }}
