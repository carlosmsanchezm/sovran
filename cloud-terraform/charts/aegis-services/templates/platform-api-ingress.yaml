{{- if and .Values.platformApi.enabled .Values.platformApi.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "aegis-services.platformApi.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis-services.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-api
  {{- with .Values.platformApi.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.platformApi.ingress.className }}
  ingressClassName: {{ .Values.platformApi.ingress.className }}
  {{- end }}
  {{- if .Values.platformApi.ingress.tls }}
  tls:
    {{- range .Values.platformApi.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.platformApi.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if .pathType }}
            pathType: {{ .pathType }}
            {{- else }}
            pathType: Prefix
            {{- end }}
            backend:
              service:
                name: {{ include "aegis-services.platformApi.fullname" $ }}
                port:
                  {{- if eq .service "grpc" }}
                  number: {{ $.Values.platformApi.service.grpcPort }}
                  {{- else }}
                  number: {{ $.Values.platformApi.service.httpPort }}
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}