{{- $kc := .Values.keycloak | default dict }}
{{- $crdReady := or (.Capabilities.APIVersions.Has "k8s.keycloak.org/v2alpha1") ($kc.forceRender | default false) }}
{{- if and ($kc.enabled | default false) $crdReady }}
{{- $ns := include "aegis-services.keycloak.namespace" . }}
{{- $adminCfg := $kc.admin | default dict }}
{{- $admin := $adminCfg.secret | default dict }}
{{- if $admin.create }}
{{- $existingAdmin := lookup "v1" "Secret" $ns ($admin.name | default "") }}
{{- $existingUsername := "" -}}
{{- $existingPassword := "" -}}
{{- if $existingAdmin }}
  {{- $existingUsername = b64dec (index $existingAdmin.data (default "username" $admin.usernameKey)) -}}
  {{- $existingPassword = b64dec (index $existingAdmin.data (default "password" $admin.passwordKey)) -}}
{{- end }}
{{- $resolvedUsername := default (default "admin" $existingUsername) $admin.username }}
{{- $resolvedPassword := default (default (randAlphaNum 32) $existingPassword) $admin.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $admin.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "aegis-services.keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ default "username" $admin.usernameKey }}: {{ $resolvedUsername | quote }}
  {{ default "password" $admin.passwordKey }}: {{ $resolvedPassword | quote }}
{{- end }}

{{- $dbCfg := $kc.database | default dict }}
{{- $db := $dbCfg.secret | default dict }}
{{- if $db.create }}
{{- $existingDb := lookup "v1" "Secret" $ns ($db.name | default "") }}
{{- $existingDbUser := "" -}}
{{- $existingDbPass := "" -}}
{{- if $existingDb }}
  {{- $existingDbUser = b64dec (index $existingDb.data (default "username" $db.usernameKey)) -}}
  {{- $existingDbPass = b64dec (index $existingDb.data (default "password" $db.passwordKey)) -}}
{{- end }}
{{- $resolvedDbUser := default (default "keycloak" $existingDbUser) $db.username }}
{{- $resolvedDbPass := default (default (randAlphaNum 32) $existingDbPass) $db.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $db.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "aegis-services.keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ default "username" $db.usernameKey }}: {{ $resolvedDbUser | quote }}
  {{ default "password" $db.passwordKey }}: {{ $resolvedDbPass | quote }}
{{- end }}

{{- $realm := $kc.realm | default dict }}
{{- $clientCfg := $realm.client | default dict }}
{{- $client := $clientCfg.secret | default dict }}
{{- if and $client.create $client.value }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $client.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "aegis-services.keycloak.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ default "clientSecret" $client.key }}: {{ $client.value }}
{{- end }}

{{- $tlsCfg := $kc.tls | default dict }}
{{- $tls := $tlsCfg.secret | default dict }}
{{- if and $tls.create (and $tls.cert $tls.key) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tls.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "aegis-services.keycloak.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $tls.cert | b64enc }}
  tls.key: {{ $tls.key | b64enc }}
{{- end }}
{{- end }}
