{{- if and .Values.platformApi.enabled .Values.platformApi.tls.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegis-services.platformApi.tlsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis-services.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-api
  annotations:
    aegis.yourorg.dev/tls-purpose: "grpc"
type: kubernetes.io/tls
data:
  tls.crt: {{ required "platformApi.tls.cert must be provided when platformApi.tls.enabled is true" .Values.platformApi.tls.cert | b64enc }}
  tls.key: {{ required "platformApi.tls.key must be provided when platformApi.tls.enabled is true" .Values.platformApi.tls.key | b64enc }}
  {{- if .Values.platformApi.tls.clientCA }}
  ca.crt: {{ .Values.platformApi.tls.clientCA | b64enc }}
  {{- end }}
{{- end }}
