{{- if .Values.proxy.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegis-services.proxy.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis-services.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
type: Opaque
data:
  jwt-secret: {{ .Values.proxy.jwtSecret | b64enc }}
  {{- range $key, $value := .Values.proxy.secrets }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
{{- end }}