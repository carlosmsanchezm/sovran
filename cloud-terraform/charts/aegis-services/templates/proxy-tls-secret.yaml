{{- if and .Values.proxy.enabled .Values.proxy.tls.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegis-services.proxy.tlsSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis-services.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
type: kubernetes.io/tls
data:
  {{- $cert := required "proxy.tls.cert must be provided when proxy.tls.enabled is true" .Values.proxy.tls.cert }}
  {{- $key := required "proxy.tls.key must be provided when proxy.tls.enabled is true" .Values.proxy.tls.key }}
  tls.crt: {{ $cert | b64enc }}
  tls.key: {{ $key | b64enc }}
{{- end }}