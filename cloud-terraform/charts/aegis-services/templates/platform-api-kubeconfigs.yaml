{{- if .Values.platformApi.enabled }}
---
# Secret containing kubeconfig files for remote clusters
# Each cluster's kubeconfig should be provided as a separate key
# For in-cluster management, a special config using service account is created
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.platformApi.kubeConfigsSecretName | default "aegis-kubeconfigs" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis-services.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-api
type: Opaque
data:
  {{- if .Values.platformApi.clusters }}
  {{- range $clusterName, $config := .Values.platformApi.clusters }}
  {{- if $config.inCluster }}
  # In-cluster config for {{ $clusterName }} using service account
  {{ $clusterName }}: {{ printf `apiVersion: v1
clusters:
- cluster:
    certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    server: https://kubernetes.default.svc
  name: %s
contexts:
- context:
    cluster: %s
    user: %s
  name: %s
current-context: %s
kind: Config
users:
- name: %s
  user:
    tokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
` $clusterName $clusterName $clusterName $clusterName $clusterName $clusterName | b64enc }}
  {{- else if $config.kubeconfig }}
  # External cluster config for {{ $clusterName }}
  {{ $clusterName }}: {{ $config.kubeconfig | b64enc }}
  {{- else if $config.server }}
  # Generated config for {{ $clusterName }}
  {{ $clusterName }}: {{ (printf "apiVersion: v1\nclusters:\n- cluster:\n    certificate-authority-data: %s\n    server: %s\n  name: %s\ncontexts:\n- context:\n    cluster: %s\n    user: %s\n  name: %s\ncurrent-context: %s\nkind: Config\nusers:\n- name: %s\n  user:\n    %s\n" ($config.certificateAuthorityData | default "") $config.server $clusterName $clusterName $clusterName $clusterName $clusterName $clusterName ($config.userConfig | default "token: changeme")) | b64enc }}
  {{- end }}
  {{- end }}
  {{- else }}
  # Default: single in-cluster configuration
  .keep: ""
  {{- end }}
{{- end }}
