{{- if .Values.platformApi.enabled }}
---
# ClusterRole to manage AegisWorkload resources across all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aegis-services.fullname" . }}-platform-api-workload-manager
  labels:
    {{- include "aegis-services.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-api
rules:
  # Workspace (v1alpha2) CRD permissions
  - apiGroups: ["aegis.yourorg.dev"]
    resources: ["workspaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["aegis.yourorg.dev"]
    resources: ["workspaces/status"]
    verbs: ["get", "update", "patch"]

  # Legacy AegisWorkload CRD permissions (backwards compatibility)
  - apiGroups: ["aegis.yourorg.dev"]
    resources: ["aegisworkloads"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["aegis.yourorg.dev"]
    resources: ["aegisworkloads/status"]
    verbs: ["get", "update", "patch"]

  # Management-plane CRDs for infrastructure and placement
  - apiGroups: ["infra.aegis.yourorg.dev"]
    resources: ["projectinfras", "projectinfras/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["infra.aegis.yourorg.dev"]
    resources: ["projectinfras/finalizers"]
    verbs: ["update", "patch"]
  - apiGroups: ["infra.aegis.yourorg.dev"]
    resources: ["projectplacements", "projectplacements/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["infra.aegis.yourorg.dev"]
    resources: ["aegisclusters", "aegisclusters/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Coordination locks for stack-level leasing
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Namespace permissions to create workload namespaces dynamically
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create"]

  # Secret management for kubeconfig synchronization
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # Pod and Job inspection for workload status
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding to bind the ClusterRole to platform-api ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aegis-services.fullname" . }}-platform-api-workload-manager
  labels:
    {{- include "aegis-services.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aegis-services.fullname" . }}-platform-api-workload-manager
subjects:
  - kind: ServiceAccount
    name: {{ .Values.platformApi.serviceAccountName }}
    namespace: {{ .Release.Namespace }}

{{- end }}
