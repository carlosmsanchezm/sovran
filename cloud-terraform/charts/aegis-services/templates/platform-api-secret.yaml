{{- if and .Values.platformApi.enabled .Values.platformApi.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aegis-services.platformApi.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis-services.labels" . | nindent 4 }}
    app.kubernetes.io/component: platform-api
type: Opaque
data:
  {{- range $key, $value := .Values.platformApi.secrets }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
{{- end }}