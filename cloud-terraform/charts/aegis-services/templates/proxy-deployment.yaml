{{- if .Values.proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegis-services.proxy.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aegis-services.labels" . | nindent 4 }}
    app.kubernetes.io/component: proxy
spec:
  replicas: {{ .Values.proxy.replicaCount }}
  selector:
    matchLabels:
      {{- include "aegis-services.proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/proxy-secret: {{ include (print $.Template.BasePath "/proxy-secret.yaml") . | sha256sum }}
        {{- if .Values.proxy.tls.enabled }}
        checksum/proxy-tls-secret: {{ include (print $.Template.BasePath "/proxy-tls-secret.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "aegis-services.proxy.selectorLabels" . | nindent 8 }}
        {{- with .Values.proxy.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.proxy.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: proxy
          image: "{{ .Values.proxy.image.repository }}:{{ .Values.proxy.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.proxy.image.pullPolicy }}
          ports:
            - name: proxy
              containerPort: {{ .Values.proxy.service.port }}
              protocol: TCP
          env:
            - name: AEGIS_PROXY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegis-services.proxy.secretName" . }}
                  key: jwt-secret
            - name: AEGIS_PROXY_EXPECTED_AUDIENCE
              value: {{ .Values.proxy.expectedAudience | quote }}
            - name: AEGIS_PROXY_LISTEN
              value: ":{{ .Values.proxy.service.port }}"
            - name: AEGIS_PROXY_ALLOWED_SUFFIX
              value: {{ .Values.proxy.allowedSuffix | quote }}
            {{- if .Values.proxy.tls.enabled }}
            - name: AEGIS_PROXY_TLS_CERT
              value: "/etc/aegis-proxy/tls.crt"
            - name: AEGIS_PROXY_TLS_KEY
              value: "/etc/aegis-proxy/tls.key"
            {{- end }}
            {{- if .Values.proxy.cluster }}
            - name: AEGIS_PROXY_CLUSTER
              value: {{ .Values.proxy.cluster | quote }}
            {{- end }}
            {{- if .Values.proxy.publicHost }}
            - name: AEGIS_PROXY_PUBLIC_HOST
              value: {{ .Values.proxy.publicHost | quote }}
            {{- end }}
            {{- range $key, $value := .Values.proxy.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.proxy.envFromSecret }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "aegis-services.proxy.secretName" $ }}
                  key: {{ $value }}
            {{- end }}
          {{- if .Values.proxy.tls.enabled }}
          volumeMounts:
            - name: proxy-tls
              mountPath: /etc/aegis-proxy
              readOnly: true
            {{- with .Values.proxy.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- else }}
          {{- with .Values.proxy.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.proxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.proxy.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.proxy.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.proxy.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or .Values.proxy.tls.enabled .Values.proxy.volumes }}
      volumes:
        {{- if .Values.proxy.tls.enabled }}
        - name: proxy-tls
          secret:
            secretName: {{ include "aegis-services.proxy.tlsSecretName" . }}
        {{- end }}
        {{- with .Values.proxy.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.proxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.proxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}