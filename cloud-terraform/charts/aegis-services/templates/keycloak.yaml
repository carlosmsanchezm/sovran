{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aegis-services.keycloak.fullname" . }}-realm
  namespace: {{ include "aegis-services.keycloak.namespace" . }}
  labels:
    {{- include "aegis-services.keycloak.labels" . | nindent 4 }}
data:
  aegis-realm.json: |
{{ .Files.Get "files/keycloak/aegis-realm.json" | indent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aegis-services.keycloak.fullname" . }}
  namespace: {{ include "aegis-services.keycloak.namespace" . }}
  labels:
    {{- include "aegis-services.keycloak.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.keycloak.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "aegis-services.keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aegis-services.keycloak.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image | quote }}
          imagePullPolicy: {{ .Values.keycloak.imagePullPolicy | default "IfNotPresent" }}
          args:
            - "start-dev"
            - "--import-realm"
            - "--http-port={{ .Values.keycloak.httpPort | default 8080 }}"
          env:
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser | default "admin" | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.keycloak.adminPassword | default "ChangeMe123!" | quote }}
            - name: KC_CACHE
              value: {{ .Values.keycloak.cache | default "local" | quote }}
            - name: KC_DB
              value: {{ .Values.keycloak.database | default "dev-file" | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.keycloak.httpPort | default 8080 }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /realms/master/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /realms/master/.well-known/openid-configuration
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
          {{- with .Values.keycloak.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: realm-import
          configMap:
            name: {{ include "aegis-services.keycloak.fullname" . }}-realm
      {{- with .Values.keycloak.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.keycloak.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.keycloak.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "aegis-services.keycloak.fullname" . }}
  namespace: {{ include "aegis-services.keycloak.namespace" . }}
  labels:
    {{- include "aegis-services.keycloak.labels" . | nindent 4 }}
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    {{- include "aegis-services.keycloak.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.keycloak.servicePort | default 8080 }}
      targetPort: http
      protocol: TCP
{{- end }}
