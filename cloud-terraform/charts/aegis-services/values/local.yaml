  env:
    LOG_LEVEL: "debug"

  securityContext: null
  containerSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: true

  # Resource constraints for local development
  resources:
    limits:
      cpu: "200m"
      memory: "256Mi"
    requests:
      cpu: "50m"
      memory: "64Mi"

  # Relaxed probes for local development
  livenessProbe:
    tcpSocket:
      port: 8085
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5

  readinessProbe:
    tcpSocket:
      port: 8085
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5

keycloak:
  enabled: true
  forceRender: true
  createNamespace: false
  operator: {}
  http:
    httpEnabled: false
  admin:
    secret:
      create: true
      name: keycloak-admin-secret
      username: admin
      password: ""
  database:
    secret:
      create: true
      name: keycloak-db-secret
      username: keycloak
      password: ""
  realm:
    enabled: true
    name: aegis
    displayName: Aegis
    client:
      id: backstage
      name: Backstage
      redirectUris:
        - http://localhost:7008/*
        - https://backstage.localtest.me/*
      webOrigins:
        - http://localhost:3000
        - https://backstage.localtest.me
      secret:
        create: true
        name: keycloak-backstage-client-secret
        value: local-backstage-client-secret
        placeholder: BACKSTAGE_CLIENT_SECRET
    requiredActions:
      - alias: CONFIGURE_TOTP
        name: Configure OTP
        providerId: CONFIGURE_TOTP
        defaultAction: true
        enabled: true
