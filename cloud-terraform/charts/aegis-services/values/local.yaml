keycloak:
  enabled: true
  forceRender: true
  createNamespace: false
  operator: {}
  http:
    httpEnabled: false
  admin:
    secret:
      create: true
      name: keycloak-admin-secret
      username: admin
      password: ""
  database:
    secret:
      create: true
      name: keycloak-db-secret
      username: keycloak
      password: ""
  realm:
    enabled: true
    name: aegis
    displayName: Aegis
    client:
      id: backstage
      name: Backstage
      redirectUris:
        - http://localhost:7008/*
        - https://backstage.localtest.me/*
      webOrigins:
        - http://localhost:3000
        - https://backstage.localtest.me
      secret:
        create: true
        name: keycloak-backstage-client-secret
        value: local-backstage-client-secret
        placeholder: BACKSTAGE_CLIENT_SECRET
    requiredActions:
      - alias: CONFIGURE_TOTP
        name: Configure OTP
        providerId: CONFIGURE_TOTP
        defaultAction: true
        enabled: true
