# Local development values for aegis-services
# This configuration is optimized for local development environments
# such as minikube, kind, or Docker Desktop Kubernetes

#################################################################
# Platform API Configuration - Local
#################################################################
platformApi:
  enabled: true
  replicaCount: 1
  serviceAccountName: aegis-platform-api

  image:
    repository: 567751785679.dkr.ecr.us-east-1.amazonaws.com/aegis/platform-api
    tag: "latest"
    pullPolicy: IfNotPresent  # Use local images if available

  service:
    type: ClusterIP  # Use port-forward for local access
    grpcPort: 8081
    httpPort: 8080

  ingress:
    enabled: false  # Not needed for local Docker Desktop

  # Local development environment variables
  env:
    LOG_LEVEL: "debug"
    AEGIS_PROXY_JWT_SECRET: "a-very-secret-key-for-local-dev-must-be-32-chars"
    AEGIS_PROXY_EXPECTED_AUDIENCE: "aegis-proxy"
    AEGIS_PROXY_BASE_URL: "http://localhost:8085"
    AUTH_STATIC_TOKEN: "supersecret"
    AUTH_STATIC_SUBJECT: "dev-user@example.com"

  # Local kubeconfig directory
  kubeConfigsDir: "/tmp/kubeconfigs"
  targetNamespace: "aegis-workloads-local"

  # Resource constraints for local development
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"

  # Disable health probes for local development (endpoints not implemented yet)
  livenessProbe: null
  readinessProbe: null

#################################################################
# Proxy Configuration - Local
#################################################################
proxy:
  enabled: true
  replicaCount: 1

  image:
    repository: 567751785679.dkr.ecr.us-east-1.amazonaws.com/aegis/proxy
    tag: "latest"
    pullPolicy: IfNotPresent  # Use local images if available

  service:
    type: ClusterIP  # Use port-forward for local access
    port: 8085

  ingress:
    enabled: false  # Not needed for local Docker Desktop

  # Local development JWT secret (32+ chars) - must match Platform API
  jwtSecret: "a-very-secret-key-for-local-dev-must-be-32-chars"
  expectedAudience: "aegis-proxy"
  allowedSuffix: ".svc.cluster.local"
  publicHost: "proxy.localtest.me"

